root = "."
tmp_dir = "tmp"

[build]
  # Build command - point to cmd/server
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  # Binary file to run
  bin = "tmp/main.exe"
  # Watch these directories
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Exclude directories
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", ".git"]
  # Exclude files
  exclude_file = []
  # Exclude regex
  exclude_regex = ["_test.go"]
  # Exclude unchanged
  exclude_unchanged = true
  # Follow symlinks
  follow_symlink = false
  # Delay before rebuild (ms)
  delay = 1000
  # Stop running old binary before building
  stop_on_error = true
  # Send interrupt signal before killing
  send_interrupt = false
  # Delay after interrupt (ms)
  kill_delay = 500
  # Log output
  log = "tmp/build-errors.log"

[log]
  # Show log time
  time = false

[color]
  # Customize colors
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

